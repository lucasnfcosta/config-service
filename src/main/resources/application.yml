server:
  port: 8888
  tomcat:
    keep-alive-timeout: 2s
    connection-timeout: 15s
    threads:
      max: 50
      min-spare: 5

spring:
  application:
    name: config-service
  cloud:
    config:
      server:
        git:
          uri: https://github.com/lucasnfcosta/config-repos
          default-label: main
